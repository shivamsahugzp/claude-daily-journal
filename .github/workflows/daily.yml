name: Daily Claude Journal

on:
  schedule:
    # 10:30 AM IST = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily-journal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (FFmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation xvfb
          echo "✅ System deps installed"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python deps installed"

      # ── Run Pipeline ──────────────────────────────────────────────────────
      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_RAW_BASE: "https://raw.githubusercontent.com/${{ github.repository }}/main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xvfb-run -a python -m pipeline.main
          echo "✅ Pipeline complete"

      # ── Deploy GitHub Pages ───────────────────────────────────────────────
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "chore: update journal site — ${{ github.run_id }}"

      # ── Upload artifacts (keep video + cards for 30 days) ────────────────
      - name: Upload daily assets
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: journal-assets-${{ github.run_id }}
          path: |
            journal/
          retention-days: 30
